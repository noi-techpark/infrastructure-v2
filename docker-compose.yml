services:
  rabbitmq:
    image: rabbitmq:management-alpine
    pull_policy: always
    ports:
      - "5671:5671"
      - "5672:5672"
      - "4369:4369"
      - "25672:25672"
      - "15672:15672"
    volumes:
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: nc -z localhost:5672
    attach: false

  mongodb:
    image: mongo:7
    ports:
      - 27017:27017
    command: --replSet rs0 --bind_ip localhost,mongodb,127.0.0.1 --port 27017
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
    attach: false
      
  # Initializes replicaset once after it has been started
  mongodb-init:
    image: mongo:7
    depends_on:
      mongodb:
        condition: service_healthy
    restart: "no"
    entrypoint: |
      mongosh "mongodb://mongodb" --eval "
        try{
          rs.initiate({
            _id : 'rs0',
            members: [
              { _id : 0, host : 'mongodb:27017' },
            ]
          })
        } catch(error) {
          // Already initialized. that's fine
          if (error.code != 23) {
            throw(error)
          }
        }"
          
  # Writer service listens on ingress queue and writes raw data to mongodb
  # DEPRECATED. See writer-2
  writer:
    image: ghcr.io/noi-techpark/infrastructure-v2/raw-writer:latest
    build:
      context: ./infrastructure/raw-writer
      dockerfile: Dockerfile
      target: release
    pull_policy: always
    environment:
      APP_MQ_URI:  amqp://guest:guest@rabbitmq:5672            
      APP_MQ_INGRESS_EXCHANGE: ingress
      APP_MQ_INGRESS_QUEUE: ingress
      APP_MQ_INGRESS_DL_QUEUE: ingress-dl 
      APP_MQ_READY_EXCHANGE: ready   
      APP_MQ_READY_QUEUE: ready      
      APP_MQ_READY_DL_QUEUE: ready-dl   
      APP_MQ_CLIENT_NAME: writer      
      APP_MONGO_URI: mongodb://mongodb/?replicaSet=rs0&directConnection=true
      APP_LOGLEVEL: INFO
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy

  # Router service listens on ready exchange (where writer writes) and distributes messages according to routing key
  router:
    image: ghcr.io/noi-techpark/infrastructure-v2/router:latest
    pull_policy: always
    environment:
      APP_MQ_URI: amqp://guest:guest@rabbitmq:5672
      APP_MQ_READY_EXCHANGE: ready
      APP_MQ_READY_QUEUE: ready
      APP_MQ_ROUTED_EXCHANGE: routed
      APP_MQ_ROUTED_QUEUE: routed
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy  
        
  # Resource lookup service
  bridge:
    image: ghcr.io/noi-techpark/infrastructure-v2/raw-data-bridge:latest
    pull_policy: always
    environment:
      APP_MONGO_URI: mongodb://mongodb/?replicaSet=rs0&directConnection=true
    depends_on:
      mongodb-init:
        condition: service_completed_successfully
      rabbitmq:
        condition: service_healthy
    ports:
      - 2000:2000

      
  # Writer service that accepts REST and writes to S3 / Mongo depending on file size
  writer-2:
    image: ghcr.io/noi-techpark/infrastructure-v2/raw-writer-2:latest
    environment:
      APP_HTTP_PORT: 8080
      APP_MQ_URI:  amqp://guest:guest@rabbitmq:5672            
      APP_MQ_READY_EXCHANGE: ready   
      APP_MQ_READY_QUEUE: ready      
      APP_MQ_READY_DL_QUEUE: ready-dl   
      APP_MQ_CLIENT_NAME: writer-2      
      APP_MONGO_URI: mongodb://mongodb/?replicaSet=rs0&directConnection=true
      APP_DB_PREFIX: ""
      APP_S3_BUCKET: raw-data
      APP_S3_REGION: eu-west-1
      APP_S3_ENDPOINT: http://minio:9000
      APP_AWS_ACCESS_KEY_ID: minioadmin
      APP_AWS_SECRET_ACCESS_KEY: minioadmin
      APP_MAX_SIZE: 104857600
      APP_LOGLEVEL: INFO
    ports:
      - "9021:8080"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      mongodb-init:
        condition: service_started
      minio:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  # S3 compatible object storage used to store large file raw data
  minio:
    image: minio/minio
    ports:
      - "9022:9000"
      - "9023:9001"  # web console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    attach: false

  # Create default S3 bucket
  minio-init:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 minioadmin minioadmin &&
        mc mb --ignore-existing local/raw-data
      "
    attach: false

volumes:
  minio:

networks:
  default:
    name: ingestion
    attachable: true
