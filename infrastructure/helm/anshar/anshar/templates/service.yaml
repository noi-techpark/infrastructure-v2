apiVersion: v1
kind: Service
metadata:
  name: {{ include "anshar.fullname" . }}
  labels:
    {{- include "anshar.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "anshar.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8012
      protocol: TCP
      name: http
