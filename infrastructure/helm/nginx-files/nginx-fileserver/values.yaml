# ── Replica count ─────────────────────────────────────────────────────────────
replicaCount: 1

# ── Image ──────────────────────────────────────────────────────────────────────
image:
  repository: nginx
  tag: "alpine"
  pullPolicy: IfNotPresent

# ── Ports ─────────────────────────────────────────────────────────────────────
ports:
  internal: 8080   # all methods (GET/PUT/POST)
  external: 8081   # GET/HEAD only

# ── Persistent Volume ─────────────────────────────────────────────────────────
persistence:
  enabled: true
  storageClass: "standard"   # change to your StorageClass
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /data

# ── Ingress ───────────────────────────────────────────────────────────────────
ingress:
  enabled: true
  className: nginx
  host: files.example.com    # change to your domain
  tls:
    enabled: false
    secretName: files-tls-secret
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "100m"

# ── NetworkPolicy ─────────────────────────────────────────────────────────────
networkPolicy:
  enabled: true
  # Namespace where the ingress controller runs
  ingressControllerNamespace: ingress-nginx

# ── Resources ─────────────────────────────────────────────────────────────────
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 256Mi

# ── nginx config tweaks ───────────────────────────────────────────────────────
nginx:
  autoindex: true
  keepaliveTimeout: 65
  workerProcesses: auto
  config: >
    user  nginx;
    worker_processes  {{ .Values.nginx.workerProcesses }};
    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      keepalive_timeout {{ .Values.nginx.keepaliveTimeout }};

      # ── Internal server: all methods ────────────────────────
      server {
        listen {{ .Values.ports.internal }};

        root {{ .Values.persistence.mountPath }};
        autoindex {{ if .Values.nginx.autoindex }}on{{ else }}off{{ end }};

        location / {
          dav_methods PUT DELETE;
          dav_access  user:rw group:r all:r;
          create_full_put_path on;

          limit_except GET HEAD PUT DELETE POST OPTIONS {
            deny all;
          }
        }
      }

      # ── External server: GET only ───────────────────────────
      server {
        listen {{ .Values.ports.external }};

        root {{ .Values.persistence.mountPath }};
        autoindex {{ if .Values.nginx.autoindex }}on{{ else }}off{{ end }};

        location / {
          limit_except GET HEAD OPTIONS {
            deny all;
          }
        }
      }
    }

