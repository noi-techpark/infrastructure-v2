nameOverride: nginx

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/proxy-body-size: "300m"
  host: files.dev.testingmachine.eu
  tls:
    enabled: true
    secretName: tls-files
    
persistence:
  enabled: true
  storageClass: "gp3"   # change to your StorageClass
  accessMode: ReadWriteOnce
  size: 5Gi
  mountPath: /data
  
nginx:  
  config: >
    user  nginx;
    worker_processes  auto;
    error_log  /var/log/nginx/error.log warn;
    pid        /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include       /etc/nginx/mime.types;
      default_type  application/octet-stream;
      sendfile      on;
      keepalive_timeout 65;

      # ── Internal server: all methods ────────────────────────
      server {
        listen 8080;

        root /data;
        autoindex on;

        location / {
          dav_methods PUT DELETE;
          dav_access  user:rw group:r all:r;
          create_full_put_path on;

          limit_except GET HEAD PUT DELETE POST OPTIONS {
            deny all;
          }
        }
      }

      # ── External server: GET only ───────────────────────────
      server {
        listen 8081;

        root /data;
        autoindex on;

        location / {
            limit_except GET HEAD OPTIONS {
                deny all;
            }
            root /data;
        }

        location /siri-lite/ {
            limit_except GET HEAD OPTIONS POST {
                deny all;
            }

            # Treat POST like GET: serve static file at the request URI
            if ($request_method = POST) {
                rewrite ^ $uri break;
            }
            root /data;

            error_page 405 =200 $uri;
        }
      }
    }