replicaCount: 2

image:
  repository: ghcr.io/noi-techpark/infrastructure-v2/raw-data-bridge
  pullPolicy: Always
  tag: "v2.0"

env:
  - name: APP_MONGO_URI
    valueFrom:
      secretKeyRef: 
        name: mongodb-collector-svcbind
        key: uri
  - name: APP_LOG_LEVEL
    value: INFO
  - name: SERVICE_NAME
    value: raw-data-bridge
  - name: TELEMETRY_TRACE_GRPC_ENDPOINT
    value: tempo-distributor-discovery.monitoring.svc.cluster.local:4317
  - name: APP_S3_ACCESS_KEY_ID
    valueFrom:
      secretKeyRef:
        name: raw-s3
        key: accessKeyId
  - name: APP_S3_SECRET_ACCESS_KEY
    valueFrom:
      secretKeyRef:
        name: raw-s3
        key: secretAccessKey
  - name: APP_S3_REGION
    valueFrom:
      secretKeyRef:
        name: raw-s3
        key: region

resources:
  limits:
    cpu: 250m
    memory: 300Mi
  requests:
    cpu: 5m
    memory: 50Mi
